<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARCOSA SLUMBERS — Галерея</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Tana Uncial SP';
            src: url('font/tana-uncial-sp.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Alegreya SC';
            src: url('font/AlegreyaSC-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        ::-webkit-scrollbar {
            width: 0;
        }

        html {
            min-height: 100%;
        }

        body {
            background: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('img/Texture.jpg') center/cover no-repeat fixed;
            font-family: 'Alegreya SC', sans-serif, system-ui;
            color: #e0e2e4;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }
        body::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 800px;
            background: linear-gradient(to bottom, transparent, #0a0a0a);
            z-index: -1;
            pointer-events: none;
        }

        /* ========== ШАПКА ========== */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0));
            padding: 2rem 6rem;
            padding-bottom: 0rem;
            gap: 1rem;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            font-family: 'Tana Uncial SP', 'Alegreya SC', serif;
            font-weight: 400;
            margin: 0;
            width: 200px;
            line-height: 90%;
        }

        header nav ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-right: 2rem;
            list-style: none;
        }

        header nav a {
            color: #ffffff;
            font-family: 'Alegreya SC';
            font-size: 16px;
            letter-spacing: 0.2px;
            text-decoration: none;
            font-weight: 400;
            padding: 0.3rem 0;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }

        header nav a:hover {
            color: #F59A07;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ + ГАЛЕРЕЯ ========== */
        main {
            padding: 0rem 2rem 5rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            justify-content: center;
        }

        /* ========== ГАЛЕРЕЯ — контейнер ========== */
        main > div {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem 1.8rem;
        }

        /* ========== КАРТОЧКИ С КАРТИНКАМИ ========== */
        main > div > div > div {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 250px;               
            width: 100%;
            border-radius: 4px;
            transition: all 0.4s ease;
            background: #0a0a0a;
            cursor: pointer;
        }

        main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease;
        }

        main > div > div > div:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.75);
            transform: translateY(-8px);
        }

        main > div > div > div:hover img {
            filter: brightness(1.20) contrast(1.10);
        }

        /* ========== ЛАЙТБОКС (ОКНО ПРОСМОТРА) ========== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.411);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s ease;
        }
        .lightbox.active {
            visibility: visible;
            opacity: 1;
        }
        .lightbox-container {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }
        .lightbox-image {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: block;
            margin: 0 auto;
        }
        .close-lightbox {
            position: absolute;
            top: -40px;
            right: 0;
            font-size: 32px;
            cursor: pointer;
            color: #fff;
            background: none;
            border: none;
            font-weight: bold;
            transition: 0.2s;
            line-height: 1;
        }
        .close-lightbox:hover {
            color: #F59A07;
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .nav-btn {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0);
            border: none;
            font-size: 32px;
            cursor: pointer;
            color: white;
            padding: 0.5rem 1rem;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .nav-btn:hover {
            color: #F59A07;
        }
        .prev-btn {
            margin-left: 20px;
        }
        .next-btn {
            margin-right: 20px;
        }
        /* Адаптивность лайтбокса */
        @media (max-width: 768px) {
            .nav-btn {
                font-size: 32px;
                padding: 0.2rem 0.6rem;
            }
            .close-lightbox {
                top: -30px;
                font-size: 32px;
            }
        }

        /* ========== ПОДВАЛ ========== */
        footer {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 1));
            padding: 2rem;
            display: flex;
            font-family: 'Alegreya SC', serif;
            font-size: 12px;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            padding: 3rem 6rem;
            gap: 2rem;
        }

        footer ul {
            list-style: none;
            text-align: left;
        }

        footer li {
            margin-bottom: 0.7rem;
        }

        footer a {
            color: #bbbbbb;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #F59A07;
        }

        .footer-game-title {
            font-size: 32px;
            font-weight: 400;
            font-family: 'Tana Uncial SP', 'Alegreya SC', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e0e0e0;
            margin-bottom: 0rem;
            width: 200px;
            line-height: 90%;
        }

        .footer-copy {
            font-size: 12px;
            color: #888888;
            margin-top: 0.5rem;
        }

        footer > div > div:last-child {
            font-size: 0.95rem;
            color: #7a7e84;
        }

        /* ========== АДАПТИВНОСТЬ ГАЛЕРЕИ ========== */
        @media (max-width: 1400px) {
            main {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            header {
                flex-direction: column;
                text-align: center;
            }
            h1 {
                font-size: 1.5rem;
            }
            main {
                padding: 1rem 0;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <header>
        <h1>CARCOSA SLUMBERS</h1>
        <nav>
            <ul>
                <li><a href="index.html#hero">дом</a></li>
                <li><a href="index.html#trailer">трейлер</a></li>
                <li><a href="index.html#cast">персонажи</a></li>
                <li><a href="index.html#backstory">предыстория</a></li>
                <li><a href="index.html#gallery">галерея</a></li>
                <li><a href="index.html#news">новости</a></li>
                <li><a href="index.html#creators">создатели</a></li>
            </ul>
        </nav>
    </header>

    <!-- Галерея -->
    <main>
        <div>
            <div><div><img src="img/screenshot1.png" alt="Изображение 1"></div></div>
            <div><div><img src="img/screenshot2.png" alt="Изображение 2"></div></div>
            <div><div><img src="img/screenshot3.png" alt="Изображение 3"></div></div>
            <div><div><img src="img/screenshot4.png" alt="Изображение 4"></div></div>
            <div><div><img src="img/screenshot5.png" alt="Изображение 5"></div></div>
            <div><div><img src="img/Main.png" alt="Изображение 6"></div></div>
            <div><div><img src="img/Trailer_Background.png" alt="Изображение 7"></div></div>
            <div><div><img src="img/story4.png" alt="Изображение 8"></div></div>
        </div>
    </main>

    <!-- Подвал -->
    <footer>
        <div>
            <div class="footer-game-title">CARCOSA SLUMBERS</div>
            <div class="footer-copy">© 2026 — все права защищены</div>
        </div>
        <ul>
            <li><a href="#">TERMS OF SERVICE</a></li>
            <li><a href="#">PRIVACY POLICY</a></li>
            <li><a href="#">TERMS AND CONDITIONS OF USE</a></li>
            <li><a href="#">TERMS AND CONDITIONS OF RE-CREATION</a></li>
        </ul>
    </footer>

    <!-- Лайтбокс (модальное окно для картинок) -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-container">
            <button class="close-lightbox" id="closeLightboxBtn">&times;</button>
            <img id="lightboxImage" class="lightbox-image" src="" alt="Увеличенное изображение">
            <div class="lightbox-nav">
                <button class="nav-btn prev-btn" id="prevImageBtn">←</button>
                <button class="nav-btn next-btn" id="nextImageBtn">→</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Собираем все изображения из галереи
            const galleryItems = Array.from(document.querySelectorAll('main img'));
            const imagesSrc = galleryItems.map(img => img.src);
            
            // Элементы лайтбокса
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightboxImage');
            const closeBtn = document.getElementById('closeLightboxBtn');
            const prevBtn = document.getElementById('prevImageBtn');
            const nextBtn = document.getElementById('nextImageBtn');
            
            let currentIndex = 0;
            
            // Функция открытия лайтбокса с определённым индексом
            function openLightbox(index) {
                if (index < 0) index = 0;
                if (index >= imagesSrc.length) index = imagesSrc.length - 1;
                currentIndex = index;
                lightboxImage.src = imagesSrc[currentIndex];
                lightbox.classList.add('active');
                // Блокируем скролл страницы
                document.body.style.overflow = 'hidden';
            }
            
            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                lightboxImage.src = ''; // очищаем, чтобы не висло
            }
            
            function showPrev() {
                let newIndex = currentIndex - 1;
                if (newIndex < 0) newIndex = imagesSrc.length - 1; // зацикливание
                currentIndex = newIndex;
                lightboxImage.src = imagesSrc[currentIndex];
            }
            
            function showNext() {
                let newIndex = currentIndex + 1;
                if (newIndex >= imagesSrc.length) newIndex = 0;
                currentIndex = newIndex;
                lightboxImage.src = imagesSrc[currentIndex];
            }
            
            // Навешиваем обработчики на каждую картинку галереи
            galleryItems.forEach((img, idx) => {
                // кликаем на родительский div (чтобы срабатывало и на пустое место)
                const cardDiv = img.closest('div > div'); // структура: main > div > div > div > img
                if (cardDiv) {
                    cardDiv.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(idx);
                    });
                } else {
                    // fallback: клик по самому img
                    img.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(idx);
                    });
                }
            });
            
            // Кнопки лайтбокса
            closeBtn.addEventListener('click', closeLightbox);
            prevBtn.addEventListener('click', showPrev);
            nextBtn.addEventListener('click', showNext);
            
            // Клик по фону (оверлею) для закрытия
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });
            
            // Клавиатурные стрелки и Escape
            window.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'ArrowLeft') {
                    showPrev();
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    showNext();
                    e.preventDefault();
                } else if (e.key === 'Escape') {
                    closeLightbox();
                    e.preventDefault();
                }
            });
        })();
    </script>
</body>
</html>
