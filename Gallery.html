<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARCOSA SLUMBERS — ГАЛЕРЕЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Tana Uncial SP';
            src: url('font/tana-uncial-sp.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Alegreya SC';
            src: url('font/AlegreyaSC-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        ::-webkit-scrollbar {
            width: 0;
        }

        html {
            min-height: 100%;                    /* важно для покрытия всей высоты */
        }

        body {
            background: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('img/Texture.jpg') center/cover no-repeat fixed;
            font-family: 'Alegreya SC', sans-serif, system-ui;
            color: #e0e2e4;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;                   /* изменили на 100vh */
            position: relative;
        }
        body::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 800px;                       /* высота градиента */
            background:linear-gradient(to bottom, transparent, #0a0a0a);
            z-index: -1;
            pointer-events: none;
        }

                /* ========== ШАПКА ========== */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0));
            padding: 2rem 6rem;
            padding-bottom: 0rem;
            gap: 1rem;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            font-family: 'Tana Uncial SP', 'Alegreya SC', serif;
            font-weight: 400;
            margin: 0;
            width: 200px;
            line-height: 90%;
        }

        header nav ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            margin-right: 2rem;
            list-style: none;
        }

        header nav a {
            color: #ffffff;
            font-family: 'Alegreya SC';
            font-size: 16px;
            letter-spacing: 0.2px;
            text-decoration: none;
            font-weight: 400;
            padding: 0.3rem 0;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }

        header nav a:hover {
            color: #F59A07;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ + ГАЛЕРЕЯ ========== */
        main {
            padding: 0rem 2rem 5rem 2rem;
            max-width: 1000px;           /* оставляем ширину сайта прежней */
            margin: 0 auto;
            flex: 1;
            display: flex;
            justify-content: center;
        }

        /* ========== ГАЛЕРЕЯ — контейнер ========== */
        main > div {
            width: 100%;
            max-width: 1200px;            /* ← увеличили ширину галереи (было 930px) */
            margin: 0 auto;
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem 1.8rem;          /* расстояния между картинками оставляем как было */
        }

        /* ========== КАРТОЧКИ С КАРТИНКАМИ ========== */
        main > div > div > div {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            height: 250px;               
            width: 100%;
            border-radius: 4px;
            transition: all 0.4s ease;
            background: #0a0a0a;
        }

        main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease;
        }

        main > div > div > div:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.75);
            transform: translateY(-8px);
        }

        main > div > div > div:hover img {
            filter: brightness(1.20) contrast(1.10);
        }
        /* ========== ПОДВАЛ ========== */
        footer {
            background: linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 1));
            padding: 2rem;
            display: flex;
            font-family: 'Alegreya SC', serif;
            font-size: 12px;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            padding: 3rem 6rem;
            gap: 2rem;
        }

        footer ul {
            list-style: none;
            text-align: left;
        }

        footer li {
            margin-bottom: 0.7rem;
        }

        footer a {
            color: #bbbbbb;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #F59A07;
        }

        .footer-game-title {
            font-size: 32px;
            font-weight: 400;
            font-family: 'Tana Uncial SP', 'Alegreya SC', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e0e0e0;
            margin-bottom: 0rem;
            width: 200px;
            line-height: 90%;
        }

        .footer-copy {
            font-size: 12px;
            color: #888888;
            margin-top: 0.5rem;
        }

        footer > div > div:last-child {
            font-size: 0.95rem;
            color: #7a7e84;
        }

                /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 800px) {
            main {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            footer {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            header {
                flex-direction: column;
                text-align: center;
            }
            h1 {
                font-size: 1.5rem;
            }
            main {
                padding: 1rem 0;
            }
 
        }
    </style>
</head>

    <nav>

    <!-- Галерея -->
